# ══════════════════════════════════════════════════════════════
# Study Pipeline v3 — config.yaml
# ══════════════════════════════════════════════════════════════

# ── 간격반복 스케줄러 ──
# "sm2" = SM-2 알고리즘 (기본값, 안전)
# "fsrs" = FSRS 6.x (migrate_to_fsrs.py 실행 후 활성화)
scheduler: sm2

# ── 사전 지식 체크 (pretest) ──
# enabled: true → 새 노트 감지 시 사전 지식 입력 stub 생성, wait_sec 동안 대기
# enabled: false → 사전 지식 단계 건너뜀 (기본값)
pretest:
  enabled: false
  wait_sec: 120    # 최대 대기 시간(초); 이후 pretest 없이 진행

# ── 인터리빙 스케줄러 ──
# "off"    = 인터리빙 비활성 (기본값)
# "soft"   = 혼동 쌍을 같은 날 근접 배치 (score +15 보너스)
# "strict" = 혼동 쌍을 반드시 인접 슬롯에 배치
interleaving_mode: soft

# ── mastery 등급 임계값 ──
mastery:
  green_threshold: 0.8
  yellow_threshold: 0.5

# ── 에너지 프로필 (시간대별 집중도) ──
# 슬롯 시작 시간과 가장 가까운 값이 해당 윈도우에 적용됨
# high  = 어려운 개념 우선 (mastery<0.5, priority=high)
# low   = 쉬운 복습 우선  (mastery≥0.8, priority=low)
# medium = 기존 score 기준
energy_profile:
  "09:00": high
  "14:00": low
  "20:00": medium

# ── 기본 경로 (v3: 파이프라인 분리) ──
vault_path: "C:/Users/skyhu/Documents/Obsidian Vault"
notes_dir: "3학년 1학기/중간고사"
pipeline_dir: "C:/Users/skyhu/Documents/AI_projects/study-pipeline"
scripts_dir: "C:/Users/skyhu/Documents/AI_projects/study-pipeline/scripts"

# ── 폴더명(한글) → 과목 키 매핑 ──
folder_mapping:
  "유기화학": "organic_chem"
  "유전체학과 AI": "genomics_ai"
  "응용균학": "mycology"

# ── LLM 설정 (v3: 3-tier) ──
llm:
  primary: "lmstudio"
  secondary: "chatgpt"
  tertiary: "claude"
  lmstudio:
    base_url: "http://100.78.18.95:1234"    # desktop-gd0g485 via Tailscale
    model: "gemma-4-e4b"
    timeout: 180           # 26B 모델이므로 넉넉하게
  chatgpt:
    model: "gpt-5.4"             # API 호출 시 사용할 모델
    max_tokens: 16384
    temperature: 0.3
    prefer_subscription: true    # Codex CLI(구독) 우선 사용
  claude:
    model: "claude-sonnet-4-6"  # API fallback 시 사용할 모델
    cli_model: "sonnet"          # CLI 기본 모델 (할당량 절약)
    max_tokens: 16384
    temperature: 0.3             # API 호출 시 temperature (thinking 모드에서는 자동 1.0)
    top_p: 1.0                   # nucleus sampling
    top_k: -1                    # -1: 비활성, 양수면 API에 전달
    thinking_budget: 10000       # extended thinking budget tokens
    prefer_subscription: true    # Claude Code CLI(구독) 우선 사용
  # 작업별 라우팅
  routing:
    # LM Studio 전용 (로컬, 비용 0)
    lmstudio_tasks:
    - "caption"
    - "classify"
    - "collect"
    - "draft"
    - "extract_keywords"
    - "summarize_draft"
    - "translate_term"
    chatgpt_tasks:
    - "cross_subject"
    - "gap_analysis"
    - "paper_analysis"
    - "study_plan"
    - "supplement"
    claude_tasks:
    - "mechanism"
    - "pubmed_overview"
    - "quiz"
    - "quiz_generate"
    - "synthesis_deep"
    - "synthesis_final"
    - "user_response"
    cli_model_override:
      "mechanism": opus
      "pubmed_overview": sonnet
      "quiz": sonnet
      "quiz_generate": sonnet
      "synthesis_deep": opus
      "synthesis_final": opus
      "user_response": opus
    gpt_model_override:
      "cross_subject": gpt-5.4
      "gap_analysis": gpt-5.4
      "paper_analysis": gpt-5.4
      "study_plan": gpt-5.4
      "supplement": gpt-5.4
    reasoning_override: {}
mem0:
  enabled: false
  user_id: "student_main"
  mode: "local_json"

# ── marker-pdf 설정 (v3) ──
marker:
  enabled: true
  batch_multiplier: 2
  langs: ["Korean", "English"]
  # fallback: marker 미설치 시 pdfplumber/pymupdf 사용

# ── 챕터 라우팅 설정 (v4) ──
chapter_routing:
  enabled: true
  similarity_threshold: 0.65
  label_patterns:
    - "챕터\\s*(\\d+)"
    - "Chapter\\s*(\\d+)"
    - "Ch\\.?\\s*(\\d+)"
    - "(\\d+)\\s*장"
    - "(\\d+)\\s*단원"

# ── 논문 관리 (v3) ──
papers:
  enabled: false
  cache_dir: "C:/Users/skyhu/Documents/AI_projects/study-pipeline/cache/papers"
  max_papers_per_topic: 5
  prefer_open_access: true
  semantic_scholar:
    enabled: true
    fields: ["title", "abstract", "year", "citationCount", "openAccessPdf", "authors"]

# ── PubMed 설정 (v3) ──
pubmed:
  enabled: false
  dynamic_keywords: true
  keyword_audience: "auto"     # auto | undergrad | research
  max_papers: 3
  min_citations: 0
  prefer_review_first: true
  skip_if_semantic_mismatch: true
  min_keyword_overlap: 1
  search_scope: "recent_5y"
  language: "english"
  email: "skyhuman13@gmail.com"  # NCBI Entrez 필수

# ── 이미지 파이프라인 (v2) ──
image_pipeline:
  priority: ["source_pdf", "source_slides", "generate"]
  generate:
    tool: "matplotlib"
    dpi: 150

# ── 퀴즈 설정 (v3.1) ──
quiz:
  prefer_textbook_problems: true
  supplement_gap_only: true

# ── Stage 4 검증 에이전트 ──
verifier:
  enabled: true
  max_retries: 2
  model: "sonnet"  # Claude CLI alias (비용 절약)
  llm_quick_scan: true
  checks:
    pedagogy: true
    style_alignment: true
    coverage: true
    provenance_claims: true
    provenance_tags: true
  coverage_threshold: 0.7
  topic_aliases_file: "templates/topic_aliases.yaml"
  required_topics:
    organic_chem:
      - "hybridization"
      - "σ/π bond"
      - "electronegativity"
      - "pKa"
      - "Lewis acid/base"
      - "Lewis structure"
      - "formal charge"
      - "bond length comparison"

# ── 출력 설정 (v2) ──
output:
  formats: ["md"]
  smoke_mode: false
  emphasis_levels:
    S: "★★★"
    D: "★★"
    E: "★"
    default: "★★"
  md:
    vault_inject: true
    include_pubmed: false
    terminology: "english_first"

# ── 과목별 설정 ──
subjects:
  organic_chem:
    folder: "유기화학"
    template: "templates/organic_chem.txt"
    synthesis_template: "templates/synthesis_prompt.txt"
    output_types: ["mechanism_quiz", "concept_summary"]
    items_per_note: 3
    terminology: "english_first"
    # v2: 소스 자료
    textbook: "PDF/Fundamentals-of-Organic-Chemistry-by-John-McMurry-7th-Edition.pdf"
    slides_dir: "PDF/"
    slide_pattern: "Chapter *.pdf"
    textbook_chapter_pages:
      ch1: [20, 56]
      ch2: [57, 96]
      ch3: [97, 130]
      ch4: [131, 173]
      ch5: [174, 207]
      ch6: [208, 240]
      ch7: [241, 274]
      ch8: [275, 312]
      ch9: [313, 343]
      ch10: [344, 390]
      ch11: [391, 422]
      ch12: [423, 451]
      ch13: [452, 487]
      ch14: [488, 521]
      ch15: [522, 556]
      ch16: [557, 589]
      ch17: [590, 616]
      appendix: [617, 663]
      index: [664, 677]
    pubmed_keywords: []
    lecture_chapters:
      ch1:
        title: "Structure and Bonding"
        slides: "Chapter 1 - Structure and Bonding.pdf"
        textbook_pages: [1, 40]
        date_range: ["2026-03-01", "2026-03-13"]
        required_topics:
          - "hybridization (sp, sp², sp³)"
          - "σ/π bond"
          - "electronegativity"
          - "polar covalent bond"
          - "Lewis acid/base"
          - "formal charge"
          - "bond length/strength (sp³ 154 pm / sp² 134 pm / sp 120 pm)"
          - "pKa and acid-base strength"
      ch2:
        title: "Polar Covalent Bonds; Acids and Bases"
        slides: "Chapter 2 - Polar Covalent Bonds.pdf"
        textbook_pages: [41, 80]
        date_range: ["2026-03-14", "2026-03-26"]
        required_topics:
          - "dipole moment"
          - "resonance structure"
          - "electrostatic potential map"
          - "Brønsted acid/base"
          - "Lewis acid/base"
          - "pKa trend interpretation"
      ch3:
        title: "Organic Compounds: Alkanes and Cycloalkanes"
        slides: "Chapter 3 - Organic Compounds and Alkanes.pdf"
        textbook_pages: [81, 120]
        date_range: ["2026-03-27", "2026-04-07"]
        required_topics:
          - "constitutional isomer"
          - "IUPAC nomenclature"
          - "cyclohexane chair conformation"
          - "ring strain"
          - "conformational analysis"
      ch4:
        title: "Stereochemistry"
        slides: "Chapter 4 - Stereochemistry.pdf"
        textbook_pages: [121, 160]
        date_range: ["2026-04-08", "2026-04-18"]
        required_topics:
          - "chirality"
          - "R/S assignment"
          - "enantiomer vs diastereomer"
          - "meso compound"
          - "optical activity"
      ch5:
        title: "Reactions of Alkenes and Alkynes"
        slides: "Chapter 5 - Reactions of Alkenes.pdf"
        textbook_pages: [161, 210]
        date_range: ["2026-04-19", "2026-04-30"]
        required_topics:
          - "electrophilic addition"
          - "Markovnikov rule"
          - "carbocation rearrangement"
          - "syn/anti addition"
          - "alkyne acidity"
          - "hydroboration-oxidation"

    chapters:
      ch1:
        required_topics:
          - "hybridization"
          - "σ/π bond"
          - "electronegativity"
          - "pKa"
          - "Lewis acid/base"
          - "Lewis structure"
          - "formal charge"
          - "bond length comparison"

  genomics_ai:
    folder: "유전체학과 AI"
    template: "templates/genomics_ai.txt"
    synthesis_template: "templates/synthesis_prompt.txt"
    output_types: ["descriptive_quiz", "concept_map"]
    items_per_note: 2
    textbook:
    slides_dir: "PDF/"
    slide_pattern: "강의 *.pdf"
    pubmed_keywords: []
  
  mycology:
    folder: "응용균학"
    template: "templates/mycology.txt"
    synthesis_template: "templates/synthesis_prompt.txt"
    output_types: ["identification_quiz", "comparison_table"]
    items_per_note: 2
    textbook:
    slides_dir: "PDF/"
    slide_pattern: "Chapter *.pdf"
    pubmed_keywords: []

