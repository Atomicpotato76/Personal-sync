name: Auto-trigger Codex on labeled issues

on:
  issues:
    types: [labeled]

jobs:
  trigger-codex:
    # codex 라벨이 붙은 경우에만 실행
    if: github.event.label.name == 'codex'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Comment @codex to trigger Codex agent
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const issueTitle = context.payload.issue.title;
            const issueBody = context.payload.issue.body || '';

            // issue 본문에서 수정 대상 파일 추출
            const fileMatch = issueBody.match(/파일:\s*`([^`]+)`/);
            const targetFile = fileMatch ? fileMatch[1] : '해당 파일';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `@codex`,
                ``,
                `이 issue의 수정사항을 구현해줘.`,
                ``,
                `**Issue:** ${issueTitle}`,
                `**수정 대상:** ${targetFile}`,
                ``,
                `issue 본문의 AS-IS / TO-BE 코드를 참고해서 수정하고,`,
                `검증 기준에 있는 항목들이 통과되도록 구현해줘.`,
                `수정 완료되면 PR을 만들어줘.`,
              ].join('\n'),
            });

            console.log(`✅ Codex trigger comment posted on issue #${issueNumber}`);
